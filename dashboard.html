<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>IRIS Dashboard · AI Saliency</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<style>
:root{--bg:#06060a;--bg2:#0c0c12;--accent:#38bdf8;--text:#f0f0f4;--muted:#4a4a5a;--border:#16161e;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Geist Mono',monospace;min-height:100vh;}
nav{padding:20px 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(6,6,10,0.8);backdrop-filter:blur(12px);z-index:100;}
.logo{font-family:'Instrument Serif',serif;font-size:22px;text-decoration:none;color:var(--text);}
.logo em{color:var(--accent);font-style:italic;}
main{max-width:1000px;margin:0 auto;padding:60px 48px;}
.welcome-h{font-family:'Instrument Serif',serif;font-size:42px;letter-spacing:-2px;margin-bottom:40px;}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px;}
.card{background:var(--bg2);border:1px solid var(--border);padding:32px;border-radius:16px;}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
.upload-box{border:1px dashed var(--border);padding:30px;text-align:center;cursor:pointer;border-radius:12px;margin-bottom:20px;}
.upload-box:hover{border-color:var(--accent);}
.btn{width:100%;padding:14px;border-radius:8px;border:none;font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:0.2s;}
.btn-primary{background:var(--text);color:var(--bg);}
.btn-video{background:var(--accent);color:white;}
.btn:disabled{opacity:0.2;cursor:not-allowed;}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-ov.active{display:flex;}
.modal{background:var(--bg2);padding:40px;border-radius:20px;width:400px;border:1px solid var(--border);}
.progress-container{height:4px;background:var(--border);margin:20px 0;border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:0.3s;}
#status-log{font-size:10px;color:var(--muted);margin-top:10px;font-family:monospace;}
</style>
</head>
<body>

<nav>
  <a href="#" class="logo"><em>dot.</em> IRIS</a>
  <div style="font-size:11px; color:var(--muted);" id="userEmail">Loading...</div>
</nav>

<main>
  <h1 class="welcome-h">Analysis <em>Engine.</em></h1>
  
  <div class="card-grid">
    <div class="card">
      <div class="card-label">Saliency Image</div>
      <div class="upload-box" onclick="document.getElementById('imgIn').click()">
        <input type="file" id="imgIn" hidden accept="image/*" onchange="handleImg(this)">
        <div id="imgTxt" style="font-size:12px;">Drop <span>Image</span></div>
      </div>
      <button class="btn btn-primary" id="btnImg" disabled>Analyze Image</button>
    </div>

    <div class="card">
      <div class="card-label" style="color:var(--accent)">Saliency Video (Auto-Compress)</div>
      <div class="upload-box" onclick="document.getElementById('vidIn').click()">
        <input type="file" id="vidIn" hidden accept="video/*" onchange="handleVid(this)">
        <div id="vidTxt" style="font-size:12px;">Drop <span>Video</span></div>
      </div>
      <button class="btn btn-video" id="btnVid" disabled>Analyze Video</button>
    </div>
  </div>
</main>

<div class="modal-ov" id="procModal">
  <div class="modal">
    <h2 style="font-family:'Instrument Serif'; margin-bottom:10px;">Processing...</h2>
    <p style="font-size:11px; color:var(--muted);">Compressing and securing your file.</p>
    <div class="progress-container"><div class="progress-fill" id="pFill"></div></div>
    <div id="status-log">Initializing...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const S_URL = 'https://qdjaiuiqvhrtthqjfdhe.supabase.co';
const S_KEY = 'sb_publishable_QXOclGe7joGLy-C6b-x4Sg_4L32xDWq';
const WORKER = 'https://irishug.irisbydot.workers.dev';
const sb = supabase.createClient(S_URL, S_KEY);

const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: true });

let user = null, sImg = null, sVid = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href='login.html'; return; }
  user = session.user;
  document.getElementById('userEmail').innerText = user.email;
}

function handleImg(i) { sImg = i.files[0]; document.getElementById('imgTxt').innerText = sImg.name; document.getElementById('btnImg').disabled = false; }
function handleVid(i) { sVid = i.files[0]; document.getElementById('vidTxt').innerText = sVid.name; document.getElementById('btnVid').disabled = false; }

document.getElementById('btnVid').onclick = async () => {
  const modal = document.getElementById('procModal');
  const log = document.getElementById('status-log');
  const fill = document.getElementById('pFill');
  modal.classList.add('active');
  
  try {
    let uploadFile = sVid;

    // 1. COMPRESS IF OVER 45MB
    if (sVid.size > 45 * 1024 * 1024) {
      log.innerText = "Large file detected. Compressing on-device...";
      if (!ffmpeg.isLoaded()) await ffmpeg.load();
      ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(sVid));
      await ffmpeg.run('-i', 'input.mp4', '-b:v', '1200k', '-preset', 'ultrafast', 'out.mp4');
      const data = ffmpeg.FS('readFile', 'out.mp4');
      uploadFile = new File([data.buffer], 'compressed.mp4', { type: 'video/mp4' });
    }

    fill.style.width = '40%';
    log.innerText = "Uploading to secure vault...";
    const path = `vids/${Date.now()}_video.mp4`;
    await sb.storage.from('analyses').upload(path, uploadFile);

    fill.style.width = '70%';
    log.innerText = "Generating one-time access link...";
    const { data: sData } = await sb.storage.from('analyses').createSignedUrl(path, 600);

    log.innerText = "Sending to AI worker...";
    await fetch(WORKER, { method: 'POST', body: JSON.stringify({ url: sData.signedUrl, email: user.email }) });

    fill.style.width = '90%';
    log.innerText = "Cleaning up storage...";
    await sb.storage.from('analyses').remove([path]);

    fill.style.width = '100%';
    log.innerText = "Finished! Check your email soon.";
    setTimeout(() => modal.classList.remove('active'), 1000);

  } catch (e) { log.innerText = "Error: " + e.message; console.error(e); }
};

init();
</script>
</body>
</html>
