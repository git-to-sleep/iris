<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In · dot. IRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#06060a;--bg2:#0c0c12;--accent:#38bdf8;--text:#f0f0f4;--muted:#4a4a5a;--border:#16161e;--green:#34d399;--red:#f87171;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Geist Mono',monospace;min-height:100vh;display:flex;flex-direction:column;}
nav{padding:24px 64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.03);}
.logo{font-family:'Instrument Serif',serif;font-size:20px;text-decoration:none;color:var(--text);}
.logo em{color:var(--accent);font-style:italic;}
.nav-link{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .15s;}
.nav-link:hover{color:var(--text);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:56px;width:100%;max-width:440px;}
.card-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.card-eyebrow::before{content:'';width:24px;height:1px;background:var(--accent);}
h1{font-family:'Instrument Serif',serif;font-size:40px;font-weight:400;letter-spacing:-2px;margin-bottom:8px;}
h1 em{color:var(--accent);font-style:italic;}
.subtitle{font-size:12px;color:var(--muted);margin-bottom:40px;line-height:1.7;}
.form{display:flex;flex-direction:column;gap:14px;}
label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:13px 16px;font-family:'Geist Mono',monospace;font-size:13px;outline:none;transition:border .15s;}
input:focus{border-color:rgba(56,189,248,0.4);}
input::placeholder{color:var(--muted);}
.forgot{font-size:11px;color:var(--muted);text-align:right;margin-top:-8px;}
.forgot a{color:var(--accent);text-decoration:none;}
.btn{width:100%;padding:15px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:opacity .15s;margin-top:4px;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.signup-link{text-align:center;font-size:12px;color:var(--muted);margin-top:20px;}
.signup-link a{color:var(--accent);text-decoration:none;}
.error-msg{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--red);border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.6;display:none;}
.verify-msg{background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);color:var(--accent);border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.6;display:none;}
footer{padding:24px 64px;border-top:1px solid var(--border);display:flex;justify-content:space-between;}
.footer-note{font-size:11px;color:var(--muted);}
@media(max-width:600px){nav{padding:20px 24px;} .card{padding:36px 28px;}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><em>dot.</em> IRIS</a>
  <a href="signup.html" class="nav-link">Sign up</a>
</nav>

<main>
  <div class="card">
    <div class="card-eyebrow">Welcome back</div>
    <h1>Sign <em>in.</em></h1>
    <p class="subtitle">Access your IRIS dashboard and credit balance.</p>

    <div id="errorMsg" class="error-msg"></div>
    <div id="verifyMsg" class="verify-msg">
      Please verify your email before signing in. Check your inbox for the verification link.
    </div>

    <form class="form" id="loginForm">
      <div>
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email"/>
      </div>
      <div>
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" required autocomplete="current-password"/>
      </div>
      <div class="forgot"><a href="#" id="forgotLink">Forgot password?</a></div>
      <button type="submit" class="btn" id="submitBtn">Sign In →</button>
    </form>

    <div class="signup-link">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</main>

<footer>
  <div class="footer-note"><em>dot.</em> IRIS</div>
  <div class="footer-note">© 2025</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON = 'YOUR_ANON_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// If already logged in, redirect to dashboard
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn   = document.getElementById('submitBtn');
  const errEl = document.getElementById('errorMsg');
  const verEl = document.getElementById('verifyMsg');
  errEl.style.display = 'none';
  verEl.style.display = 'none';

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in ...';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = 'Sign In →';

  if (error) {
    if (error.message.toLowerCase().includes('email')) {
      verEl.style.display = 'block';
    } else {
      errEl.textContent = error.message;
      errEl.style.display = 'block';
    }
  } else {
    window.location.href = 'dashboard.html';
  }
});

// Forgot password
document.getElementById('forgotLink').addEventListener('click', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) {
    document.getElementById('errorMsg').textContent = 'Enter your email address first.';
    document.getElementById('errorMsg').style.display = 'block';
    return;
  }
  await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://git-to-sleep.github.io/iris/login.html'
  });
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('verifyMsg').textContent = 'Password reset email sent — check your inbox.';
  document.getElementById('verifyMsg').style.display = 'block';
});
</script>
</body>
</html>
